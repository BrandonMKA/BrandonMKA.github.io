<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      const path = window.location.pathname;
      const query = window.location.search;
      const hash = window.location.hash;
      sessionStorage.setItem("redirectPath", path + query + hash);
      window.location.replace("/");
    </script>
  </head>
  <body></body>
</html>
